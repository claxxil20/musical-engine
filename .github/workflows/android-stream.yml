name: Android Emulator Stream

on:
  workflow_dispatch: # Allows you to run this manually from the GitHub Actions tab

jobs:
  stream-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display and Streaming Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK & Create AVD
        run: |
          # Install specific Android 33 components
          sdkmanager --install "system-images;android-33;google_apis;x86_64" "emulator" "platform-tools"
          
          # Create the AVD device
          echo "no" | avdmanager create avd \
            --name test_avd \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_5" \
            --force

      - name: Download and Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Virtual Framebuffer, Emulator, and VNC
        run: |
          # 1. Start Xvfb (Virtual display) on screen :1 with standard phone aspect ratio
          Xvfb :1 -screen 0 1080x1920x24 &
          sleep 2
          export DISPLAY=:1
          
          # 2. Start the Android Emulator inside the virtual window
          # Using swiftshader for software-backed GL rendering inside the headless runner
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -camera-back none \
            -camera-front none &
          
          # 3. Start x11vnc to scrape display :1 and host a VNC server on port 5900
          x11vnc -display :1 -nopw -forever -bg -rfbport 5900 &
          sleep 2

          # 4. Use noVNC to translate VNC raw streams into an HTTP Websocket on port 8083
          # This maps the default index file so hitting the root URL loads the UI directly
          ln -s /usr/share/novnc/vnc.html /usr/share/novnc/index.html
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 8083 &
          sleep 2

      - name: Expose Stream via Cloudflare Tunnel
        run: |
          echo "=========================================================="
          echo "🚀 LOOK BELOW FOR THE '.trycloudflare.com' LINK TO CONNECT 🚀"
          echo "=========================================================="
          
          # Force cloudflared to block and keep the workflow alive while streaming port 8083
          cloudflared tunnel --url http://localhost:8083
          
