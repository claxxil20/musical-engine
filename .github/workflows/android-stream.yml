name: Android Emulator Stream

on:
  workflow_dispatch:

jobs:
  stream-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display and Streaming Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Cache the cloudflared deb package so it skips downloading next time
      - name: Cache Cloudflared Binary
        id: cache-cloudflared
        uses: actions/cache@v4
        with:
          path: ./cloudflared.deb
          key: ${{ runner.os }}-cloudflared-v1

      - name: Download Cloudflared
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

      - name: Install Cloudflared
        run: |
          sudo dpkg -i cloudflared.deb

      - name: Start Emulator and Stream
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          emulator-boot-timeout: 600
          emulator-options: -no-snapshot -gpu swiftshader_indirect -no-audio -camera-back none -camera-front none
          script: |
            # By this point the action has already booted the emulator and
            # confirmed it's ready — no manual boot-wait needed.

            # 1. Start Xvfb (Virtual display) — the emulator's own -no-window
            #    display gets redirected here via DISPLAY
            Xvfb :1 -screen 0 1080x1920x24 &
            sleep 3
            export DISPLAY=:1

            # 2. Start x11vnc bound specifically to IPv4 loopback
            x11vnc -display :1 -nopw -forever -bg -listen 127.0.0.1 -rfbport 5900 &
            sleep 3

            # 3. Set up local web root assets for noVNC
            mkdir -p ./novnc_web
            cp -r /usr/share/novnc/* ./novnc_web/
            ln -sf ./vnc.html ./novnc_web/index.html

            # 4. Run websockify to bridge port 8083 to VNC port 5900
            websockify --web ./novnc_web 127.0.0.1:8083 127.0.0.1:5900 &
            sleep 5

            echo "=========================================================="
            echo "🚀 LOOK BELOW FOR THE '.trycloudflare.com' LINK TO CONNECT 🚀"
            echo "=========================================================="

            # 5. Block here so the action doesn't tear the emulator down.
            #    This must be the last command and must not return.
            cloudflared tunnel --url http://127.0.0.1:8083
