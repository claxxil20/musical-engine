name: Android Emulator Stream

on:
  workflow_dispatch:

jobs:
  stream-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify KVM support
        run: |
          if [ ! -e /dev/kvm ]; then
            echo "::error::/dev/kvm not found — emulator cannot run with acceleration on this runner."
            exit 1
          fi
          ls -la /dev/kvm

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display and Streaming Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # Cache the Android SDK System Images & Emulator binary
      - name: Cache Android SDK Components
        id: cache-android
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/system-images/android-33
            ${{ env.ANDROID_HOME }}/emulator
          key: ${{ runner.os }}-android-33-v1

      - name: Install Android SDK Components
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDK_MANAGER --licenses
          echo "y" | $SDK_MANAGER "system-images;android-33;google_apis;x86_64" "emulator" "platform-tools"

      - name: Create AVD
        run: |
          AVD_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          echo "no" | $AVD_MANAGER create avd \
            --name test_avd \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_5" \
            --force

      # Cache the cloudflared deb package so it skips downloading next time
      - name: Cache Cloudflared Binary
        id: cache-cloudflared
        uses: actions/cache@v4
        with:
          path: ./cloudflared.deb
          key: ${{ runner.os }}-cloudflared-v1

      - name: Download Cloudflared
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

      - name: Install Cloudflared
        run: |
          sudo dpkg -i cloudflared.deb

      - name: Start Virtual Framebuffer and Emulator
        run: |
          # 1. Start Xvfb (Virtual display)
          Xvfb :1 -screen 0 1080x1920x24 &
          sleep 3
          export DISPLAY=:1

          # 2. Start the Android Emulator, logging output instead of discarding it
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-audio \
            -no-boot-anim \
            -no-window \
            -gpu swiftshader_indirect \
            -camera-back none \
            -camera-front none > emulator.log 2>&1 &

          # 3. Wait for the device to register with adb
          echo "Waiting for device..."
          $ANDROID_HOME/platform-tools/adb wait-for-device

          # 4. Poll until Android has actually finished booting (not just Xvfb existing)
          echo "Waiting for boot to complete..."
          boot_completed=""
          tries=0
          until [[ "$boot_completed" == "1" ]] || [[ $tries -ge 60 ]]; do
            boot_completed=$($ANDROID_HOME/platform-tools/adb shell getprop sys.boot_completed 2>/dev/null | tr -d '\r')
            sleep 2
            tries=$((tries+1))
          done

          if [[ "$boot_completed" != "1" ]]; then
            echo "::error::Emulator failed to boot within timeout (120s)"
            echo "----- emulator.log -----"
            cat emulator.log
            exit 1
          fi
          echo "Emulator boot completed after $((tries*2))s"

      - name: Start VNC and noVNC Stream
        run: |
          export DISPLAY=:1

          # 1. Start x11vnc bound specifically to IPv4 loopback
          x11vnc -display :1 -nopw -forever -bg -listen 127.0.0.1 -rfbport 5900 &
          sleep 3

          # 2. Set up local web root assets for noVNC
          mkdir -p ./novnc_web
          cp -r /usr/share/novnc/* ./novnc_web/
          ln -sf ./vnc.html ./novnc_web/index.html

          # 3. Run websockify directly to bridge port 8083 to VNC port 5900
          websockify --web ./novnc_web 127.0.0.1:8083 127.0.0.1:5900 &
          sleep 5

      - name: Expose Stream via Cloudflare Tunnel
        run: |
          echo "=========================================================="
          echo "🚀 LOOK BELOW FOR THE '.trycloudflare.com' LINK TO CONNECT 🚀"
          echo "=========================================================="

          # Route directly to the verified IPv4 websockify server
          cloudflared tunnel --url http://127.0.0.1:8083
