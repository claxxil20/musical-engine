name: Android Emulator Stream

on:
  workflow_dispatch: # Allows you to run this manually from the GitHub Actions tab

jobs:
  stream-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display and Streaming Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Android SDK & Create AVD
        run: |
          # Explicit paths to pre-installed SDK binaries on the GitHub Runner
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          AVD_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          
          # Auto-accept licenses to prevent terminal hangs
          echo "y" | $SDK_MANAGER --licenses
          
          # Install system image and components using absolute path
          echo "y" | $SDK_MANAGER "system-images;android-33;google_apis;x86_64" "emulator" "platform-tools"
          
          # Create the AVD
          echo "no" | $AVD_MANAGER create avd \
            --name test_avd \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_5" \
            --force

      - name: Download and Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Start Virtual Framebuffer, Emulator, and VNC
        run: |
          # 1. Start Xvfb (Virtual display) on screen :1
          Xvfb :1 -screen 0 1080x1920x24 &
          sleep 2
          export DISPLAY=:1
          
          # 2. Start the Android Emulator inside the virtual window
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -camera-back none \
            -camera-front none &
          
          # 3. Start x11vnc to bridge the Xvfb display to a VNC port
          x11vnc -display :1 -nopw -forever -bg -rfbport 5900 &
          sleep 2

          # 4. Use noVNC to make the stream readable via a standard browser
          ln -s /usr/share/novnc/vnc.html /usr/share/novnc/index.html
          /usr/share/novnc/utils/launch.sh --vnc localhost:5900 --listen 8083 &
          sleep 2

      - name: Expose Stream via Cloudflare Tunnel
        run: |
          echo "=========================================================="
          echo "🚀 LOOK BELOW FOR THE '.trycloudflare.com' LINK TO CONNECT 🚀"
          echo "=========================================================="
          
          # Block and listen on port 8083, creating the public temporary proxy URL
          cloudflared tunnel --url http://localhost:8083
          
