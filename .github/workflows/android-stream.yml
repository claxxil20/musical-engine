name: Android Emulator Stream

on:
  workflow_dispatch:

jobs:
  stream-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Display and Streaming Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11vnc novnc websockify

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # Cache the Android SDK System Images & Emulator binary
      - name: Cache Android SDK Components
        id: cache-android
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_HOME }}/system-images/android-33
            ${{ env.ANDROID_HOME }}/emulator
          key: ${{ runner.os }}-android-33-v1

      - name: Install Android SDK Components
        if: steps.cache-android.outputs.cache-hit != 'true'
        run: |
          SDK_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          echo "y" | $SDK_MANAGER --licenses
          echo "y" | $SDK_MANAGER "system-images;android-33;google_apis;x86_64" "emulator" "platform-tools"

      - name: Create AVD
        run: |
          AVD_MANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager"
          echo "no" | $AVD_MANAGER create avd \
            --name test_avd \
            --package "system-images;android-33;google_apis;x86_64" \
            --device "pixel_5" \
            --force

      # Cache the cloudflared deb package so it skips downloading next time
      - name: Cache Cloudflared Binary
        id: cache-cloudflared
        uses: actions/cache@v4
        with:
          path: ./cloudflared.deb
          key: ${{ runner.os }}-cloudflared-v1

      - name: Download Cloudflared
        if: steps.cache-cloudflared.outputs.cache-hit != 'true'
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb

      - name: Install Cloudflared
        run: |
          sudo dpkg -i cloudflared.deb

      - name: Start Virtual Framebuffer, Emulator, and VNC
        run: |
          # 1. Start Xvfb (Virtual display)
          Xvfb :1 -screen 0 1080x1920x24 &
          sleep 3
          export DISPLAY=:1
          
          # 2. Start the Android Emulator
          $ANDROID_HOME/emulator/emulator -avd test_avd \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -camera-back none \
            -camera-front none &
          
          # 3. Start x11vnc bound specifically to IPv4 loopback
          x11vnc -display :1 -nopw -forever -bg -listen 127.0.0.1 -rfbport 5900 &
          sleep 3

          # Set up local web root assets for noVNC
          mkdir -p ./novnc_web
          cp -r /usr/share/novnc/* ./novnc_web/
          ln -sf ./vnc.html ./novnc_web/index.html
          
          # 4. FIX: Run websockify directly to bridge port 8083 to VNC port 5900
          # This avoids launch.sh's shell environment script drops
          websockify --web ./novnc_web 127.0.0.1:8083 127.0.0.1:5900 &
          sleep 5

      - name: Expose Stream via Cloudflare Tunnel
        run: |
          echo "=========================================================="
          echo "🚀 LOOK BELOW FOR THE '.trycloudflare.com' LINK TO CONNECT 🚀"
          echo "=========================================================="
          
          # Route directly to the verified IPv4 websockify server
          cloudflared tunnel --url http://127.0.0.1:8083
          
